    <div id="NewsViewer" class="box">
        <div class="center">
            <h1 style="margin-left: auto; margin-top: 0; margin-right: auto;">News</h1>
            <!--Loading Animation-->
            <div id="LoadAnimation" style="margin-left: 0; margin-top: 0; margin-bottom: 0; margin-right: 50px;" class="loading-icon">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
            <!-- Edit Button -->
            <button id="EditButton" style="width: 200px; height: 70px; display: none;"><p style="font-size: 50px; margin-top: 0%;" onclick="OpenEditMenu()">Edit</p></button>
        </div>
        <div id="NewsText" class="version_bar">
            <div id="LoadAnimation2" class="center">
                <div  style="margin-left: 0; margin-top: 20px; margin-bottom: 20px; margin-right: 50px;" class="loading-icon">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
            </div>
        </div>

    <!-- News Editor -->
    <div style="display: none;" id="NewsEditor" class="box">
        <h1>News Editor</h1>
        <div class="left">
            <button onclick="AddText()"><img style="margin-top: 10%;" width="50px" src="photos/Text.png" alt=""></button>
            <button onclick="AddInnerText()"><img style="margin-top: 10%;" width="50px" src="photos/InnerText.png" alt=""></button>
            <button onclick="AddImage()"><img style="margin-top: 10%;" width="60px" src="photos/AddPicture.png" alt=""></button>
            <button onclick="AddLink()"><img style="margin-top: 10%;" width="60px" src="photos/Link.png" alt=""></button>
            <button onclick="AddHeading()"><img style="margin-top: 10%;" width="60px" src="photos/Heading.png" alt=""></button>
            <button onclick="AddLeft()"><img style="margin-top: 10%;" width="60px" src="photos/Left.png" alt=""></button>
            <button onclick="AddCenter()"><img style="margin-top: 10%;" width="60px" src="photos/Center.png" alt=""></button>
            <button onclick="AddRight()"><img style="margin-top: 10%;" width="60px" src="photos/Right.png" alt=""></button>
        </div>
        <textarea name="" id="NewsEditInput"></textarea>
        <div class="right">
            <p style="margin-right: 40px; font-size: 30px;" id="ErrorText" class="AccountFail">Error Occured</p>
            <button onclick="SetNewsData()"><p>Post</p></button>
        </div>
