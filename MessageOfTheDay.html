</head>
<body>
     <!--navigation bar-->
     <div class="navbar">
        <ul>
            <li><a href="Home.html">Home</a></li>
            <li><a href="updates.html">Patch Notes</a></li>

            <li class="active"><a href="MessageOfTheDay.html">Daily Message</a></li>
            <li class="theme-dropdown"><a><img id="CurrentThemeDisplay" src="photos/LightMode.png" class="logo"></a>
                <div class="dropdown-content">
                    <div class="center">
                        <a style="z-index: 1;" onclick="ButtonSetTheme('Light')"><img class="logo" src="photos/LightMode.png"></a>
                        <a style="z-index: 1;" onclick="ButtonSetTheme('Custom')"><img class="logo" src="photos/CustomMode.png"></a>
                        <a style="z-index: 1;" onclick="ButtonSetTheme('Night')"><img class="logo" src="photos/NightMode.png"></a>
                    </div>
                    <div id="CustomColorDropDown" class="CustomColorDropDown">
                        <input id='ChosenColor' type="color">
                        <button style="align-self: center; justify-self: center;"><p>Apply</p></button>
                    </div>
                </div>
            </li>
            <li ><img src="photos/logo.png" class="logo"></li>
            <li class="theme-dropdown" style="margin-left: auto; margin-right: 159px;"><a><img id="PFP" src="photos/NoPFP.png" class="logo"></a>
                <div class="dropdown-content">
                    <!-- <input id="ChosenPFP" type="file" name="image" accept="image/*" />
                    <button onclick="SetPFPInDatabase()"><p>Apply</p></button> -->
                    <a style="z-index: 1;" href="AccountSettings.html"><p>Account Settings</p></a>
                    <a style="z-index: 1;" onclick="LogOut()"><p>Log out</p></a>
                </div>
            </li>
        </ul>
    </div>

    <!--Read-->
    <div id="ReadBox" class="box">
        <div class="center">
            <!--Header-->
            <h1 style="margin-left: auto; margin-right: auto; margin-top: 0;">Daily Message</h1>
            <!--Error Text-->
            <p style="margin-right: 40px; font-size: 30px;" id="ErrorText" class="AccountFail">Error Occured</p>
            <!--Loading Animation-->
            <div id="LoadAnimation" style="margin-left: 0; margin-top: 0; margin-bottom: 0; margin-right: 50px;" class="loading-icon">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
            <!--Edit Button-->
            <button id="EditButton" style="width: 200px; height: 70px; display: none;"><p style="font-size: 50px; margin-top: 0%;" onclick="ShowPopUp('EditBox', 'block'), HidePopUp('ReadBox')">Edit</p></button>
        </div>
        <div class="version_bar">
            <div style="padding: 50px;" id="MessageLoadAnimation" class="center">
                <div style="margin-left: 0; margin-top: 0; margin-bottom: 0; margin-right: 50px;" class="loading-icon">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
            </div>
            <p id="Message" style="font-size: 50px; margin-left: 10px; margin-bottom: 25px;"></p>
        </div>
    </div>
    <!--Edit-->
    <div style="display: none;" id="EditBox" class="box">
        <div class="center">
            <button id="EditButton" style="width: 200px; height: 70px;"><p style="font-size: 50px; margin-top: 0%;" onclick="ShowPopUp('ReadBox', 'block'), HidePopUp('EditBox')">Cancle</p></button>
            <h1 style="margin-left: 14%; margin-right: auto; margin-top: 0; text-align: center;">Daily Message</h1>
        </div>
        <div class="version_bar">
            <div class="left">
                <label for="date"><p>Date</p></label>
                <input name="date" type="date" id="Date">
            </div>
            <textarea id="EditMessage" style="font-size: 50px;" oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"></textarea>
            <div class="right">
                <!--Error text-->
                <p style="margin-right: 40px; font-size: 30px;" id="EditErrorText" class="AccountFail">Error Occured</p>
                <!--Load Animatiob-->
                <div id="EditLoadAnimation" style="margin-left: 0; margin-top: 0; margin-bottom: 10px; margin-right: 50px; display: none;" class="loading-icon">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
                <!--Button-->
                <button id="ConfirmButton" onclick="PostDailyMessage()"><p>Confirm</p></button>
            </div>
        </div>
    </div>

    <!--Scripts-->
    <script src="scripts/PopUp.js"></script>
    <script src="scripts/Verify.js"></script>
    <script src="scripts/Account.js"></script>
    <script src="scripts/Themes.js"></script><!--Themes-->
    <script src="scripts/DailyMessage.js"></script>
</body>
</html>
