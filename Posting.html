    <!--MainPage-->

    <!--Post-->
    <div style="margin-top: 70px;">
        <div class="box">
            <h1 style="text-align: left;">Make a post</h1>
            <label for="category"><p>Category</p></label>
            <select name="category" id="category">
                <option value="Fun">Fun</option>
                <option value="Serious">Serious</option>
                <option value="Community">Community</option>
                <option value="Complaint">Complaint</option>
                <option value="Confession">Confession</option>
                <option value="Other">Other</option>
            </select>
                
            <div class="version_bar">
                <!--TextBox-->
                <textarea id="PostTextInput" oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"></textarea>

                <!--SubmitButton-->
                <div class="right">
                    <div id="PostLoad" style="margin-left: 0; margin-top: 0; margin-bottom: 20px; margin-right: 50px; display: none;" class="loading-icon">
                        <div class="dot"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                    </div>
                    <button id="PostButton" onclick="PublishPost()"><p>Post</p></button>
                </div>
            </div>
        </div>
