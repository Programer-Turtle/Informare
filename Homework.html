                    <div class="dropdown-content">
                        <div class="center">
                            <a style="z-index: 1;" onclick="ButtonSetTheme('Light')"><img class="logo" src="photos/LightMode.png"></a>
                            <a style="z-index: 1;" onclick="ButtonSetTheme('Custom')"><img class="logo" src="photos/CustomMode.png"></a>
                            <a style="z-index: 1;" onclick="ButtonSetTheme('Night')"><img class="logo" src="photos/NightMode.png"></a>
                        </div>
                        <div id="CustomColorDropDown" class="CustomColorDropDown">

                    <div class="dropdown-content">

            </ul>
        </div>

        <!--Main Page-->
        <div 
            class="box"><h2>Homework Manager</h2>
        </div>

        <div class="homework_bar">
            <h1 id="homework" class="box">Assignments</h1>
            <div id="list" class="list">
                <div id="Loading" class="center">
                    <div style="margin-left: 0; margin-top: 0; margin-bottom: 0; margin-right: 50px;" class="loading-icon">
                        <div class="dot"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <!--Input Section-->
        <div style="width: 20vw; margin-left: auto; margin-right: auto;" class="box">
            <div class="center">
                <p style="text-align: center;">Assignment</p>
            </div>
            <div class="center">
                <input id="assignmentInput">
            </div>
            <div class="center">
                <p style="text-align: center;">Due Date</p>
            </div>
            <div class="center">
                <input type="date" id="DueDateInput"></input>
            </div>  
            <div class="center">
                <p style="text-align: center;">Points</p>
            </div>
            <div class="center">
                <input type="number" id="PointsInput"></input>
            </div>  
            <div class="center">
                <p style="text-align: center;">Notes</p>
            </div>
            <div class="center">
                <textarea id="NotesInput" cols="30" rows="4"></textarea>
            </div>
            <div class="center">
                <p id="ErrorText" class="AccountFail"></p>
            </div>
            <div class="center">
                <button onclick="GetAssignmentDataFromInput()" style="border-radius: 25px;"><p style="font-size: 30px;">Add Assignment</p></button>
            </div>  
        </div>
        <script src="scripts/PopUp.js"></script>
        <script src="scripts/Verify.js"></script>
        <script src="scripts/Account.js"></script>
        <script src="scripts/HomeWork.js"></script>
        <script src="scripts/Themes.js"></script>
        <script src="scripts/Music.js"></script>
